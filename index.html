<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner for Hospital</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-light p-3">
    <div class="container text-center shadow-sm bg-white p-4 rounded-4">
        <h4 class="mb-4">📱 เครื่องสแกนพกพา (External)</h4>
        
        <input type="text" id="targetToken" class="form-control mb-3" placeholder="ระบุรหัสโต๊ะตรวจ (เช่น DR001)">
        
        <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden;"></div>
        
        <div id="statusText" class="mt-3 fw-bold text-primary">รอการสแกน...</div>
    </div>

    <script>
        // *** วาง URL ที่ได้จาก Google Apps Script (Deployment ID) ตรงนี้ ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznqWWzF4pVCmqX9MoPt9FS9GFjK6zD58KOqhexuUVc8sT1Wurukajc1npwmt2S33cl/exec";

        const html5QrCode = new Html5Qrcode("reader");

        // โหลด Token เดิมถ้ามี
        const savedToken = localStorage.getItem('lastToken');
        if (savedToken) document.getElementById('targetToken').value = savedToken;

        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, (hn) => {
            sendToGAS(hn);
        }).catch(err => {
            document.getElementById('statusText').innerText = "❌ กล้องขัดข้อง: " + err;
        });

        function sendToGAS(hn) {
            const token = document.getElementById('targetToken').value;
            if (!token) { alert("กรุณาระบุรหัสโต๊ะ!"); return; }
            localStorage.setItem('lastToken', token);

            document.getElementById('statusText').innerText = "⏳ กำลังส่งข้อมูล HN: " + hn;

            // ใช้ Fetch API ส่งข้อมูลข้ามระบบไปยัง Google Apps Script
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // จำเป็นต้องใช้ no-cors สำหรับ GAS
                body: JSON.stringify({ token: token, hn: hn })
            })
            .then(() => {
                document.getElementById('statusText').innerText = "✅ ส่งข้อมูลสำเร็จ: " + hn;
                if (navigator.vibrate) navigator.vibrate(200);
            })
            .catch(err => {
                document.getElementById('statusText').innerText = "❌ Error: " + err;
            });
        }
    </script>
</body>
</html>
